<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem("beeeats_theme");if(t==="light")document.documentElement.classList.add("light-mode");})()</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sixtyfour&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/view-songs.css">
  <link rel="stylesheet" href="../assets/css/logout-modal.css">
  <title>BEEEATS</title>
  <style>
    /* ── Mobile fixes for view-songs ───────────────────────────────────── */
    @media (max-width: 767px) {
      .table-header, .track-row {
        grid-template-columns: 32px 2fr 1fr 50px;
        gap: 10px;
        padding: 8px 10px;
      }
      .col-date { display: none; }
      .playlist-cover { width: 140px; height: 140px; }
      .playlist-details .playlist-title { font-size: 18px; }
      .playlist-details { min-width: 0; }
    }

    @media (max-width: 639px) {
      /* Re-enable hamburger — this page uses sidebar not bottom nav */
      .menu-toggle { display: flex !important; }
      body.sidebar-open .sidebar { transform: translateX(0) !important; box-shadow: 4px 0 24px rgba(0,0,0,0.4); }
      body.sidebar-open .menu-toggle { left: 272px; }
      .main { padding-bottom: 24px !important; }

      .view-songs-main { padding-top: 64px; }

      .playlist-header-info {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
        margin-bottom: 28px;
      }
      .playlist-cover { width: 160px; height: 160px; }
      .playlist-details { align-items: center; width: 100%; min-width: 0; }
      .playlist-details .playlist-title { font-size: 16px; }
      .playlist-details .playlist-desc  { font-size: 12px; }
      .header-actions { justify-content: center; }

      .table-header, .track-row {
        grid-template-columns: 28px 1fr 48px;
        gap: 8px;
        padding: 8px;
      }
      .col-album { display: none; }
      .col-date  { display: none; }
      .track-thumb, .track-thumb-placeholder { width: 36px; height: 36px; }
      .track-name   { font-size: 13px; }
      .track-artist { font-size: 11px; }
      .col-duration { font-size: 12px; }
      .col-index    { font-size: 12px; }

      .share-toast { bottom: 32px; }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" aria-label="Toggle menu" type="button">
    <span class="menu-icon"></span>
  </button>
  <div class="sidebar-overlay" aria-hidden="true"></div>

  <div class="layout">
    <aside class="sidebar">
      <h1 class="text-logo">BEEEATS</h1>
      <nav class="nav">
        <a class="nav-item" href="dashboard.html">Home</a>
        <a class="nav-item" href="playlist-mixing/select-playlist.html">Playlist Mixing</a>
        <a class="nav-item" href="profile.html">Profile</a>
        <a class="nav-item" href="friends.html">Friends</a>
        <a class="nav-item" onclick="showLogoutModal()" style="cursor:pointer;">Log Out</a>
      </nav>
    </aside>

    <main class="main view-songs-main">
      <div class="playlist-header-info">
        <img alt="Playlist Cover" class="playlist-cover" id="dynamic-cover" style="display:none;">
        <div class="playlist-details">
          <h1 class="playlist-title" id="dynamic-title">Loading…</h1>
          <p class="playlist-desc" id="dynamic-desc">Generated by BEEEATS</p>
          <div class="playlist-meta">
            <span class="meta-user" id="dynamic-user">—</span>
            <span class="meta-stats" id="dynamic-stats">Loading songs…</span>
          </div>
          <div class="header-actions">
            <button class="save-btn" id="saveBtn" style="display:none;">
              ＋ Save to Library
            </button>
            <div class="share-wrap">
              <button class="share-btn" id="shareBtn">
                <span>↗</span> Share
              </button>
              <div class="share-dropdown" id="shareDropdown">
                <button class="share-option" id="copyPageLink">
                  <span class="share-icon">🔗</span> Copy link to this page
                </button>
                <button class="share-option" id="copySpotifyLink">
                  <span class="share-icon">🎵</span> Copy Spotify playlist link
                </button>
                <button class="share-option" id="openSpotify">
                  <span class="share-icon">↗</span> Open in Spotify
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="songs-table">
        <div class="table-header">
          <div class="col-index">#</div>
          <div class="col-title">Title</div>
          <div class="col-album">Album</div>
          <div class="col-date">Date added</div>
          <div class="col-duration">Time</div>
        </div>
        <div id="tracks-container">
          <p style="color:#bbb;font-size:14px;padding:20px 0;">Loading tracks…</p>
        </div>
      </div>
    </main>
  </div>

  <div class="share-toast" id="shareToast">Copied!</div>

  <!-- Logout Modal -->
  <div id="logoutModal" class="logout-overlay hidden" onclick="hideLogoutModal()">
    <div class="logout-card" onclick="event.stopPropagation()">
      <p class="logout-title">Log out?</p>
      <p class="logout-sub">You'll need to reconnect with Spotify to use BEEEATS</p>
      <button class="logout-confirm-btn" onclick="confirmLogout()">Log out</button>
      <button class="logout-cancel-btn" onclick="hideLogoutModal()">Cancel</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../backend/config.js"></script>
  <script src="../../backend/supabase.js"></script>
  <script src="../../backend/auth.js"></script>
  <script src="../../backend/logout-modal.js"></script>
  <script>
    let spotifyPlaylistUrl  = null;
    let currentPlaylistId   = null;
    let currentPlaylistData = null;
    let currentToken        = null;
    let isFollowing         = false;

    function showToast(msg = 'Copied!') {
      const toast = document.getElementById('shareToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast('Copied!');
      });
    }

    function setSaveBtn(following) {
      isFollowing = following;
      const btn = document.getElementById('saveBtn');
      btn.style.display = 'flex';
      if (following) {
        btn.textContent = '✓ Saved';
        btn.classList.add('saved');
        btn.title = 'Click to remove from library';
      } else {
        btn.textContent = '＋ Save to Library';
        btn.classList.remove('saved');
        btn.title = 'Save to your Spotify library';
      }
    }

    async function checkFollowing(playlistId, token) {
      try {
        const userId = localStorage.getItem('spotify_id');
        if (!userId) return false;
        const res = await fetch(
          `https://api.spotify.com/v1/playlists/${playlistId}/followers/contains?ids=${userId}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        const data = await res.json();
        return Array.isArray(data) ? data[0] === true : false;
      } catch { return false; }
    }

    async function followPlaylist(playlistId, token) {
      const res = await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/followers`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ public: false }),
      });
      return res.ok;
    }

    async function unfollowPlaylist(playlistId, token) {
      const res = await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/followers`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      return res.ok;
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      if (isFollowing) {
        const ok = await unfollowPlaylist(currentPlaylistId, currentToken);
        if (ok) {
          setSaveBtn(false);
          showToast('Removed from library');
          if (window.supabaseClient && currentPlaylistId) {
            await window.supabaseClient.from('remix_playlists').delete().eq('spotify_playlist_id', currentPlaylistId);
          }
        } else showToast('Something went wrong');
      } else {
        const ok = await followPlaylist(currentPlaylistId, currentToken);
        if (ok) {
          setSaveBtn(true);
          showToast('Saved to library!');
          if (window.supabaseClient && currentPlaylistId && currentPlaylistData) {
            const pl = currentPlaylistData;
            const MARKER = 'Generated remix playlist';
            if (pl.description && pl.description.includes(MARKER)) {
              const myId = localStorage.getItem('spotify_id');
              await mirrorPlaylistToSupabase(
                pl.id, myId, pl.name, pl.description,
                pl.tracks?.total ?? 0, pl.external_urls?.spotify ?? null
              ).catch(() => {});
            }
          }
        } else showToast('Something went wrong');
      }
      btn.disabled = false;
    });

    document.getElementById('shareBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('shareDropdown').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('copyPageLink').addEventListener('click', () => {
      copyToClipboard(window.location.href);
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('copySpotifyLink').addEventListener('click', () => {
      if (spotifyPlaylistUrl) copyToClipboard(spotifyPlaylistUrl);
      else showToast('No Spotify link found');
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('openSpotify').addEventListener('click', () => {
      if (spotifyPlaylistUrl) window.open(spotifyPlaylistUrl, '_blank', 'noopener');
      document.getElementById('shareDropdown').classList.remove('open');
    });

    function msToDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60);
      const sec = String(totalSec % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function spotifyGet(path, token) {
      const res = await fetch(`https://api.spotify.com/v1${path}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error(`Spotify API error ${res.status}`);
      return res.json();
    }

    async function initViewSongs() {
      requireAuth();
      await refreshTokenIfNeeded();
      const token = getSession().access_token;
      currentToken = token;

      const params = new URLSearchParams(window.location.search);
      const playlistId = params.get('id');
      currentPlaylistId = playlistId;

      if (!playlistId) {
        document.getElementById('dynamic-title').textContent = 'No playlist selected';
        document.getElementById('tracks-container').innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">Go back and select a playlist.</p>';
        return;
      }

      try {
        const [playlist, following] = await Promise.all([
          spotifyGet(`/playlists/${playlistId}`, token),
          checkFollowing(playlistId, token),
        ]);
        currentPlaylistData = playlist;
        spotifyPlaylistUrl = playlist.external_urls?.spotify || null;

        const cover = playlist.images?.[0]?.url;
        if (cover) {
          const coverEl = document.getElementById('dynamic-cover');
          coverEl.src = cover;
          coverEl.style.display = '';
        }
        document.getElementById('dynamic-title').textContent = playlist.name || 'Untitled';
        document.getElementById('dynamic-desc').textContent  = playlist.description || 'Generated by BEEEATS';
        document.getElementById('dynamic-user').textContent  = playlist.owner?.display_name || 'user';
        document.getElementById('dynamic-stats').textContent = `${playlist.tracks?.total ?? 0} songs`;

        setSaveBtn(following);

        // Use /items endpoint (Feb 2026 Spotify migration)
        const allItems = [];
        let url = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50`;
        while (url) {
          const res  = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
          const data = await res.json();
          allItems.push(...(data.items || []));
          url = data.next;
        }

        const container = document.getElementById('tracks-container');
        if (!allItems.length) {
          container.innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">No tracks found.</p>';
          return;
        }

        container.innerHTML = '';
        allItems.forEach((item, idx) => {
          const t = item.track;
          if (!t) return;
          const albumImg   = t.album?.images?.[2]?.url || t.album?.images?.[0]?.url || '';
          const artists    = (t.artists || []).map(a => escapeHtml(a.name)).join(', ');
          const albumName  = escapeHtml(t.album?.name || '—');
          const addedDate  = formatDate(item.added_at);
          const duration   = msToDuration(t.duration_ms);
          const spotifyUrl = t.external_urls?.spotify || '#';

          const row = document.createElement('div');
          row.className = 'track-row';
          row.innerHTML = `
            <div class="col-index">${idx + 1}</div>
            <div class="col-title">
              <div class="track-title-cell">
                ${albumImg ? `<img class="track-thumb" src="${escapeHtml(albumImg)}" alt="" />` : '<div class="track-thumb-placeholder"></div>'}
                <div class="track-title-info">
                  <a class="track-name" href="${escapeHtml(spotifyUrl)}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a>
                  <span class="track-artist">${artists}</span>
                </div>
              </div>
            </div>
            <div class="col-album">${albumName}</div>
            <div class="col-date">${addedDate}</div>
            <div class="col-duration">${duration}</div>
          `;
          container.appendChild(row);
        });

      } catch (err) {
        console.error('Failed to load playlist:', err);
        document.getElementById('dynamic-title').textContent = 'Error loading playlist';
        document.getElementById('tracks-container').innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">Could not load tracks.</p>';
      }
    }

    // Sidebar toggle
    const toggleSidebar = () => document.body.classList.toggle('sidebar-open');
    document.querySelector('.menu-toggle')?.addEventListener('click', toggleSidebar);
    document.querySelector('.sidebar-overlay')?.addEventListener('click', () => {
      document.body.classList.remove('sidebar-open');
    });
    document.querySelector('.sidebar')?.addEventListener('click', (e) => {
      if (e.target.closest('.nav-item') && window.matchMedia('(max-width: 639px)').matches) {
        document.body.classList.remove('sidebar-open');
      }
    });

    async function init() {
      await initViewSongs();
      setupSessionClear();
      startOwnershipCheck();
    }
    init();
  </script>
</body>
</html>
