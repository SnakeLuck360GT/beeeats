<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sixtyfour&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/view-songs.css">
  <title>BEEEATS - View Songs</title>
  <style>
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .save-btn {
      background: #FFD600;
      border: none;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, background 0.2s;
    }

    .save-btn:hover { opacity: 0.85; }

    .save-btn.saved {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-weight: 400;
    }

    .save-btn.saved:hover {
      border-color: #ff4444;
      color: #ff4444;
      opacity: 1;
    }

    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .share-wrap {
      position: relative;
      display: inline-block;
    }

    .share-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .share-btn:hover {
      border-color: #FFD600;
      color: #FFD600;
    }

    .share-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      min-width: 220px;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .share-dropdown.open { display: block; }

    .share-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .share-option:hover { background: rgba(255,255,255,0.07); }
    .share-option .share-icon { font-size: 16px; flex-shrink: 0; }

    .share-toast {
      position: fixed;
      bottom: 90px; /* above bottom nav on mobile */
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #FFD600;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }

    .share-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Fix sidebar on this page */
    @media (max-width: 639px) {
      .menu-toggle { display: flex !important; }
      .main { padding-bottom: 24px !important; }
      .sidebar-overlay { z-index: 98; }
      .sidebar { z-index: 100; transform: translateX(-100%); }
      body.sidebar-open .sidebar { transform: translateX(0) !important; box-shadow: 4px 0 24px rgba(0,0,0,0.4); }
      body.sidebar-open .menu-toggle { left: 272px; }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" aria-label="Toggle menu" type="button">
    <span class="menu-icon"></span>
  </button>
  <div class="sidebar-overlay" aria-hidden="true"></div>

  <div class="layout">
    <aside class="sidebar">
      <h1 class="text-logo">BEEEATS</h1>
      <nav class="nav">
        <a class="nav-item" href="dashboard.html">Home</a>
        <a class="nav-item" href="playlist-mixing/select-playlist.html">Playlist Mixing</a>
      </nav>
    </aside>

    <main class="main view-songs-main">
      <div class="playlist-header-info">
        <img src="https://picsum.photos/250" alt="Playlist Cover" class="playlist-cover" id="dynamic-cover">
        <div class="playlist-details">
          <h1 class="playlist-title" id="dynamic-title">Loading…</h1>
          <p class="playlist-desc" id="dynamic-desc">Generated by BEEEATS Mixer</p>
          <div class="playlist-meta">
            <span class="meta-user" id="dynamic-user">—</span>
            <span class="meta-stats" id="dynamic-stats">Loading songs…</span>
          </div>
          <div class="header-actions">
            <button class="save-btn" id="saveBtn" style="display:none;">
              ＋ Save to Library
            </button>
            <div class="share-wrap">
              <button class="share-btn" id="shareBtn">
                <span>↗</span> Share
              </button>
              <div class="share-dropdown" id="shareDropdown">
                <button class="share-option" id="copyPageLink">
                  <span class="share-icon">🔗</span> Copy link to this page
                </button>
                <button class="share-option" id="copySpotifyLink">
                  <span class="share-icon">🎵</span> Copy Spotify playlist link
                </button>
                <button class="share-option" id="openSpotify">
                  <span class="share-icon">↗</span> Open in Spotify
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="songs-table">
        <div class="table-header">
          <div class="col-index">#</div>
          <div class="col-title">Title</div>
          <div class="col-album">Album</div>
          <div class="col-date">Date added</div>
          <div class="col-duration">Time</div>
        </div>
        <div id="tracks-container">
          <p style="color:#bbb;font-size:14px;padding:20px 0;">Loading tracks…</p>
        </div>
      </div>
    </main>
  </div>

  <div class="share-toast" id="shareToast">Copied!</div>



  <script>
    let spotifyPlaylistUrl = null;
    let currentPlaylistId  = null;
    let currentToken       = null;
    let isFollowing        = false;

    // ── Token management ──────────────────────────────────────────────────
    async function getValidToken() {
      let accessToken     = localStorage.getItem('spotify_access_token');
      let refreshToken    = localStorage.getItem('spotify_refresh_token');
      let expiryTimestamp = localStorage.getItem('spotify_expiry_timestamp');

      if (!accessToken || !refreshToken) {
        window.location.href = 'login.html';
        return null;
      }

      if (Date.now() > Number(expiryTimestamp)) {
        try {
          const response = await fetch('https://spotifycallback.netlify.app/.netlify/functions/api/refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: refreshToken }),
          });
          const text = await response.text();
          if (!response.ok) { window.location.href = 'login.html'; return null; }
          const { access_token, expires_in } = JSON.parse(text);
          accessToken     = access_token;
          expiryTimestamp = Date.now() + expires_in * 1000;
          localStorage.setItem('spotify_access_token', accessToken);
          localStorage.setItem('spotify_expiry_timestamp', expiryTimestamp);
        } catch {
          window.location.href = 'login.html';
          return null;
        }
      }

      return accessToken;
    }

    // ── Profile for bottom nav ────────────────────────────────────────────
    async function loadProfile(token) {
      try {
        const me     = await spotifyGet('/me', token);
        const btn    = document.getElementById('profileNavBtn');
        const avatar = document.getElementById('navAvatar');
        if (me.external_urls?.spotify) btn.href = me.external_urls.spotify;
        const imgUrl = me.images?.[0]?.url;
        if (imgUrl) {
          avatar.outerHTML = `<img class="nav-avatar" id="navAvatar" src="${escapeHtml(imgUrl)}" alt="Profile" />`;
        } else {
          avatar.textContent = (me.display_name || me.id || '?')[0].toUpperCase();
        }
      } catch { /* leave placeholder */ }
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function showToast(msg = 'Copied!') {
      const toast = document.getElementById('shareToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast('Copied!');
      });
    }

    function msToDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60);
      const sec = String(totalSec % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function spotifyGet(path, token) {
      const res = await fetch(`https://api.spotify.com/v1${path}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error(`Spotify API error ${res.status} on ${path}`);
      return res.json();
    }

    // ── Save / follow ─────────────────────────────────────────────────────
    function setSaveBtn(following) {
      isFollowing = following;
      const btn = document.getElementById('saveBtn');
      btn.style.display = 'flex';
      if (following) {
        btn.textContent = '✓ Saved';
        btn.classList.add('saved');
        btn.title = 'Click to remove from library';
      } else {
        btn.textContent = '＋ Save to Library';
        btn.classList.remove('saved');
        btn.title = 'Save to your Spotify library';
      }
    }

    async function checkFollowing(playlistId, token) {
      try {
        const me  = await spotifyGet('/me', token);
        const res = await fetch(
          `https://api.spotify.com/v1/playlists/${playlistId}/followers/contains?ids=${me.id}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        const data = await res.json();
        return Array.isArray(data) ? data[0] === true : false;
      } catch { return false; }
    }

    async function followPlaylist(playlistId, token) {
      const res = await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/followers`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ public: false }),
      });
      return res.ok;
    }

    async function unfollowPlaylist(playlistId, token) {
      const res = await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/followers`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      return res.ok;
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      const token = await getValidToken();
      if (!token) return;
      if (isFollowing) {
        const ok = await unfollowPlaylist(currentPlaylistId, token);
        if (ok) { setSaveBtn(false); showToast('Removed from library'); }
        else showToast('Something went wrong');
      } else {
        const ok = await followPlaylist(currentPlaylistId, token);
        if (ok) { setSaveBtn(true); showToast('Saved to library!'); }
        else showToast('Something went wrong');
      }
      btn.disabled = false;
    });

    // ── Share dropdown ────────────────────────────────────────────────────
    document.getElementById('shareBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('shareDropdown').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('copyPageLink').addEventListener('click', () => {
      copyToClipboard(window.location.href);
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('copySpotifyLink').addEventListener('click', () => {
      if (spotifyPlaylistUrl) copyToClipboard(spotifyPlaylistUrl);
      else showToast('No Spotify link found');
      document.getElementById('shareDropdown').classList.remove('open');
    });
    document.getElementById('openSpotify').addEventListener('click', () => {
      if (spotifyPlaylistUrl) window.open(spotifyPlaylistUrl, '_blank', 'noopener');
      document.getElementById('shareDropdown').classList.remove('open');
    });

    // ── Main init ─────────────────────────────────────────────────────────
    async function initViewSongs() {
      const token = await getValidToken();
      if (!token) return;

      currentToken = token;
      loadProfile(token);

      const params = new URLSearchParams(window.location.search);
      const playlistId = params.get('id');
      currentPlaylistId = playlistId;

      if (!playlistId) {
        document.getElementById('dynamic-title').textContent = 'No playlist selected';
        document.getElementById('tracks-container').innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">Go back and select a playlist.</p>';
        return;
      }

      try {
        const playlist = await spotifyGet(`/playlists/${playlistId}`, token);

        spotifyPlaylistUrl = playlist.external_urls?.spotify || null;

        const cover = playlist.images?.[0]?.url;
        if (cover) document.getElementById('dynamic-cover').src = cover;
        document.getElementById('dynamic-title').textContent = playlist.name || 'Untitled';
        document.getElementById('dynamic-desc').textContent  = playlist.description || 'Generated by BEEEATS Mixer';
        document.getElementById('dynamic-user').textContent  = playlist.owner?.display_name || 'user';
        document.getElementById('dynamic-stats').textContent = `${playlist.tracks?.total ?? 0} songs`;

        const following = await checkFollowing(playlistId, token);
        setSaveBtn(following);

        const allItems = [];
        let url = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50`;
        while (url) {
          const res  = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
          const data = await res.json();
          allItems.push(...(data.items || []));
          url = data.next;
        }

        const container = document.getElementById('tracks-container');
        if (!allItems.length) {
          container.innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">No tracks found.</p>';
          return;
        }

        container.innerHTML = '';
        allItems.forEach((item, idx) => {
          const t = item.track;
          if (!t) return;

          const albumImg   = t.album?.images?.[2]?.url || t.album?.images?.[0]?.url || '';
          const artists    = (t.artists || []).map(a => escapeHtml(a.name)).join(', ');
          const albumName  = escapeHtml(t.album?.name || '—');
          const addedDate  = formatDate(item.added_at);
          const duration   = msToDuration(t.duration_ms);
          const spotifyUrl = t.external_urls?.spotify || '#';

          const row = document.createElement('div');
          row.className = 'track-row';
          row.innerHTML = `
            <div class="col-index">${idx + 1}</div>
            <div class="col-title">
              <div class="track-title-cell">
                ${albumImg
                  ? `<img class="track-thumb" src="${escapeHtml(albumImg)}" alt="" />`
                  : '<div class="track-thumb-placeholder"></div>'
                }
                <div class="track-title-info">
                  <a class="track-name" href="${escapeHtml(spotifyUrl)}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a>
                  <span class="track-artist">${artists}</span>
                </div>
              </div>
            </div>
            <div class="col-album">${albumName}</div>
            <div class="col-date">${addedDate}</div>
            <div class="col-duration">${duration}</div>
          `;
          container.appendChild(row);
        });

      } catch (err) {
        console.error('Failed to load playlist:', err);
        document.getElementById('dynamic-title').textContent = 'Error loading playlist';
        document.getElementById('tracks-container').innerHTML = '<p style="color:#bbb;font-size:14px;padding:20px 0;">Could not load tracks.</p>';
      }
    }

    document.querySelector('.sidebar-overlay')?.addEventListener('click', () => {
      document.body.classList.remove('sidebar-open');
    });

    const toggleSidebar = () => document.body.classList.toggle('sidebar-open');
    document.querySelector('.menu-toggle')?.addEventListener('click', toggleSidebar);
    document.querySelector('.sidebar')?.addEventListener('click', (e) => {
      if (e.target.closest('.nav-item') && window.matchMedia('(max-width: 639px)').matches) {
        document.body.classList.remove('sidebar-open');
      }
    });

    initViewSongs();
  </script>
</body>
</html>
